<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Collection Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-base:#0a0a0f; --bg-card:#111118; --bg-surface:#16161f; --bg-hover:#1e1e2a;
    --border:rgba(255,255,255,0.06); --text-primary:#e8e8f0; --text-muted:#6b6b80; --text-dim:#3a3a4a;
    --digi-accent:#3b82f6; --digi-glow:rgba(59,130,246,0.15);  --digi-border:rgba(59,130,246,0.3);  --digi-bright:#60a5fa;
    --gun-accent:#06b6d4;  --gun-glow:rgba(6,182,212,0.15);    --gun-border:rgba(6,182,212,0.3);    --gun-bright:#22d3ee;
    --rift-accent:#a855f7; --rift-glow:rgba(168,85,247,0.15);  --rift-border:rgba(168,85,247,0.3);  --rift-bright:#c084fc;
    --radius-sm:6px; --radius-md:10px;
  }
  html { scroll-behavior:smooth; }
  body { font-family:'Exo 2',sans-serif; background:var(--bg-base); color:var(--text-primary); min-height:100vh; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }

  /* HEADER */
  header { position:relative; z-index:10; padding:32px 48px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:16px; }
  .header-eyebrow { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; color:var(--text-muted); text-transform:uppercase; }
  h1 { font-family:'Rajdhani',sans-serif; font-size:34px; font-weight:700; letter-spacing:2px; text-transform:uppercase; background:linear-gradient(135deg,#fff 40%,#888); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
  .status-badge { font-family:'Share Tech Mono',monospace; font-size:11px; padding:6px 12px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-surface); color:var(--text-muted); display:flex; align-items:center; gap:6px; }
  .status-dot { width:7px; height:7px; border-radius:50%; background:#4ade80; box-shadow:0 0 8px #4ade80; }
  .status-dot.loading { background:#f59e0b; box-shadow:0 0 8px #f59e0b; animation:pulse 1s infinite; }
  .status-dot.error   { background:#f87171; box-shadow:0 0 8px #f87171; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

  /* NAV */
  .game-nav { position:sticky; top:0; z-index:20; background:rgba(10,10,15,0.92); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); display:flex; padding:0 48px; }
  .nav-tab { font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:600; letter-spacing:2px; text-transform:uppercase; padding:16px 28px; border:none; background:none; color:var(--text-muted); cursor:pointer; border-bottom:2px solid transparent; transition:all 0.2s; }
  .nav-tab:hover { color:var(--text-primary); }
  .nav-tab.active[data-game="digimon"]   { color:var(--digi-bright);  border-bottom-color:var(--digi-accent); }
  .nav-tab.active[data-game="gundam"]    { color:var(--gun-bright);   border-bottom-color:var(--gun-accent); }
  .nav-tab.active[data-game="riftbound"] { color:var(--rift-bright);  border-bottom-color:var(--rift-accent); }
  .nav-badge { display:inline-block; font-size:10px; background:var(--bg-surface); border:1px solid var(--border); border-radius:99px; padding:1px 6px; margin-left:6px; vertical-align:middle; }

  /* MAIN */
  main { position:relative; z-index:1; padding:0 48px 80px; }
  .game-section { display:none; }
  .game-section.active { display:block; }

  /* SECTION HEADER */
  .section-header { padding:32px 0 24px; display:flex; flex-wrap:wrap; align-items:flex-start; justify-content:space-between; gap:24px; }
  .section-game-label { font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:3px; text-transform:uppercase; }
  .section-title { font-family:'Rajdhani',sans-serif; font-size:26px; font-weight:700; letter-spacing:1px; text-transform:uppercase; }

  /* STATS */
  .stats-row { display:flex; gap:10px; flex-wrap:wrap; }
  .stat-chip { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:10px 18px; display:flex; flex-direction:column; gap:2px; min-width:110px; }
  .stat-label { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); }
  .stat-value { font-family:'Rajdhani',sans-serif; font-size:22px; font-weight:700; line-height:1; }
  .progress-wrap { background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:10px 18px; display:flex; flex-direction:column; gap:6px; min-width:200px; }
  .progress-header { display:flex; justify-content:space-between; align-items:center; }
  .progress-bar-bg { height:6px; background:var(--bg-hover); border-radius:99px; overflow:hidden; }
  .progress-bar-fill { height:100%; border-radius:99px; transition:width 0.6s ease; }

  /* TOOLBAR */
  .toolbar { display:flex; flex-wrap:wrap; gap:10px; align-items:center; padding:14px 0 18px; border-top:1px solid var(--border); }
  .toolbar-group { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .toolbar-sep { width:1px; height:28px; background:var(--border); margin:0 4px; }
  select, .filter-btn { font-family:'Exo 2',sans-serif; font-size:13px; background:var(--bg-surface); border:1px solid var(--border); color:var(--text-primary); padding:7px 12px; border-radius:var(--radius-sm); cursor:pointer; transition:border-color 0.2s,background 0.2s; outline:none; }
  select:hover, .filter-btn:hover { background:var(--bg-hover); }
  .filter-btn { display:flex; align-items:center; gap:5px; }
  .filter-btn.active { font-weight:600; }
  .toggle-view { display:flex; background:var(--bg-surface); border:1px solid var(--border); border-radius:var(--radius-sm); overflow:hidden; }
  .view-btn { font-size:15px; padding:7px 12px; border:none; background:none; color:var(--text-muted); cursor:pointer; transition:all 0.2s; }
  .view-btn.active { color:var(--text-primary); background:var(--bg-hover); }
  .result-count { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--text-muted); }
  .print-group { display:flex; gap:8px; margin-left:auto; }
  .btn-action { font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; letter-spacing:1px; text-transform:uppercase; padding:7px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-surface); color:var(--text-muted); cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:6px; }
  .btn-action:hover { background:var(--bg-hover); color:var(--text-primary); }
  .search-wrap { position:relative; display:flex; align-items:center; }
  .search-icon { position:absolute; left:9px; font-size:12px; color:var(--text-muted); pointer-events:none; }
  .search-input { font-family:'Exo 2',sans-serif; font-size:13px; background:var(--bg-surface); border:1px solid var(--border); color:var(--text-primary); padding:7px 12px 7px 30px; border-radius:var(--radius-sm); outline:none; width:180px; transition:border-color 0.2s,width 0.2s; }
  .search-input:focus { width:220px; }

  /* GRID */
  .card-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:12px; }
  .card-item { background:var(--bg-card); border:1px solid var(--border); border-radius:var(--radius-md); overflow:hidden; transition:transform 0.18s,border-color 0.18s,box-shadow 0.18s; position:relative; cursor:pointer; }
  .card-item:hover { transform:translateY(-3px); }
  .card-item.unowned { opacity:0.4; filter:grayscale(0.7); }
  .card-item.unowned:hover { opacity:0.7; filter:grayscale(0.3); }
  .card-img-wrap { aspect-ratio:3/4; background:var(--bg-surface); overflow:hidden; position:relative; }
  .card-img-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
  .card-img-placeholder { width:100%; height:100%; display:flex; align-items:center; justify-content:center; font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-dim); text-align:center; padding:8px; }
  .owned-badge { position:absolute; top:6px; right:6px; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:11px; font-weight:700; }
  .card-info { padding:8px 10px 10px; }
  .card-number { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--text-muted); margin-bottom:2px; }
  .card-name { font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .card-rarity { font-size:10px; color:var(--text-muted); margin-top:2px; }
  .card-toggle { position:absolute; bottom:0; left:0; right:0; background:rgba(0,0,0,0.75); border:none; color:#fff; font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:1px; padding:7px; cursor:pointer; opacity:0; transition:opacity 0.2s; text-align:center; }
  .card-item:hover .card-toggle { opacity:1; }

  /* TABLE */
  .card-table-wrap { overflow-x:auto; border:1px solid var(--border); border-radius:var(--radius-md); }
  .card-table { width:100%; border-collapse:collapse; font-size:13px; }
  .card-table th { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--text-muted); text-align:left; padding:12px 16px; border-bottom:1px solid var(--border); background:var(--bg-surface); white-space:nowrap; cursor:pointer; user-select:none; }
  .card-table th:hover { color:var(--text-primary); }
  .card-table th .sa { margin-left:4px; opacity:0.4; }
  .card-table th.sorted .sa { opacity:1; }
  .card-table td { padding:9px 16px; border-bottom:1px solid var(--border); vertical-align:middle; }
  .card-table tr:last-child td { border-bottom:none; }
  .card-table tr:hover td { background:var(--bg-hover); }
  .card-table tr.unowned td { opacity:0.45; }
  .table-thumb { width:34px; height:46px; object-fit:cover; border-radius:3px; display:block; }
  .thumb-ph { width:34px; height:46px; background:var(--bg-surface); border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--text-dim); }
  .owned-pill { display:inline-flex; align-items:center; gap:4px; font-size:11px; font-weight:600; padding:3px 10px; border-radius:99px; font-family:'Share Tech Mono',monospace; cursor:pointer; border:none; transition:filter 0.15s; }
  .owned-pill.yes { background:rgba(34,197,94,0.12); color:#4ade80; }
  .owned-pill.no  { background:rgba(239,68,68,0.1);  color:#f87171; }
  .owned-pill:hover { filter:brightness(1.3); }
  .owned-pill:disabled { opacity:0.5; pointer-events:none; }

  /* EMPTY / LOADING */
  .empty-state { text-align:center; padding:80px 20px; color:var(--text-muted); font-family:'Share Tech Mono',monospace; font-size:13px; }
  .loading-state { text-align:center; padding:80px 20px; color:var(--text-muted); font-family:'Share Tech Mono',monospace; font-size:13px; display:flex; flex-direction:column; align-items:center; gap:16px; }
  .spinner { width:32px; height:32px; border:2px solid var(--border); border-top-color:var(--text-muted); border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* SETUP BANNER */
  .setup-banner { background:var(--bg-surface); border:1px solid rgba(251,191,36,0.3); border-radius:var(--radius-md); padding:20px 24px; margin:24px 0; display:flex; gap:16px; align-items:flex-start; }
  .setup-banner h3 { font-family:'Rajdhani',sans-serif; font-size:16px; font-weight:700; color:#fbbf24; margin-bottom:6px; }
  .setup-banner p { font-size:13px; color:var(--text-muted); line-height:1.6; }
  .setup-banner code { font-family:'Share Tech Mono',monospace; background:var(--bg-hover); padding:2px 6px; border-radius:3px; font-size:12px; color:var(--text-primary); }

  /* TOAST */
  #toast { position:fixed; bottom:24px; right:24px; z-index:999; display:flex; flex-direction:column; gap:8px; }
  .toast-msg { font-family:'Share Tech Mono',monospace; font-size:12px; padding:10px 16px; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-surface); animation:slideIn 0.2s ease; }
  .toast-msg.ok  { border-color:rgba(74,222,128,0.3); color:#4ade80; }
  .toast-msg.err { border-color:rgba(248,113,113,0.3); color:#f87171; }
  @keyframes slideIn { from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1} }

  /* GAME ACCENTS */
  [data-section="digimon"]   .section-game-label,[data-section="digimon"]   .stat-value{color:var(--digi-bright)}
  [data-section="digimon"]   .stat-chip{border-color:var(--digi-border)} [data-section="digimon"] .progress-wrap{border-color:var(--digi-border)} [data-section="digimon"] .progress-bar-fill{background:var(--digi-accent)}
  [data-section="digimon"]   .card-item.owned:hover{border-color:var(--digi-border);box-shadow:0 0 18px var(--digi-glow)} [data-section="digimon"] .owned-badge{background:var(--digi-glow);color:var(--digi-bright);border:1px solid var(--digi-border)} [data-section="digimon"] .filter-btn.active{border-color:var(--digi-border);color:var(--digi-bright)}
  [data-section="gundam"]    .section-game-label,[data-section="gundam"]    .stat-value{color:var(--gun-bright)}
  [data-section="gundam"]    .stat-chip{border-color:var(--gun-border)}  [data-section="gundam"]  .progress-wrap{border-color:var(--gun-border)}  [data-section="gundam"]  .progress-bar-fill{background:var(--gun-accent)}
  [data-section="gundam"]    .card-item.owned:hover{border-color:var(--gun-border);box-shadow:0 0 18px var(--gun-glow)}  [data-section="gundam"]  .owned-badge{background:var(--gun-glow);color:var(--gun-bright);border:1px solid var(--gun-border)}  [data-section="gundam"]  .filter-btn.active{border-color:var(--gun-border);color:var(--gun-bright)}
  [data-section="riftbound"] .section-game-label,[data-section="riftbound"] .stat-value{color:var(--rift-bright)}
  [data-section="riftbound"] .stat-chip{border-color:var(--rift-border)} [data-section="riftbound"] .progress-wrap{border-color:var(--rift-border)} [data-section="riftbound"] .progress-bar-fill{background:var(--rift-accent)}
  [data-section="riftbound"] .card-item.owned:hover{border-color:var(--rift-border);box-shadow:0 0 18px var(--rift-glow)} [data-section="riftbound"] .owned-badge{background:var(--rift-glow);color:var(--rift-bright);border:1px solid var(--rift-border)} [data-section="riftbound"] .filter-btn.active{border-color:var(--rift-border);color:var(--rift-bright)}

  /* PRINT — handled via dedicated print window, not window.print() */

  @media(max-width:600px){
    header,.game-nav,main{padding-left:16px;padding-right:16px}
    .game-nav{padding:0 8px} .nav-tab{padding:14px 14px;font-size:12px}
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="header-eyebrow">// collection tracker</div>
    <h1>TCG Dashboard</h1>
  </div>
  <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
    <div class="status-badge">
      <span class="status-dot loading" id="status-dot"></span>
      <span id="status-text">Connecting…</span>
    </div>
    <button class="btn-action" onclick="reloadAll()">↺ Refresh</button>
  </div>
</header>

<nav class="game-nav">
  <button class="nav-tab active" data-game="digimon"   onclick="switchGame('digimon')"  >⬡ Digimon   <span class="nav-badge" id="badge-digimon">—</span></button>
  <button class="nav-tab"        data-game="gundam"    onclick="switchGame('gundam')"   >◈ Gundam    <span class="nav-badge" id="badge-gundam">—</span></button>
  <button class="nav-tab"        data-game="riftbound" onclick="switchGame('riftbound')">✦ Riftbound <span class="nav-badge" id="badge-riftbound">—</span></button>
</nav>

<main>
  <div id="setup-notice"></div>

  <section class="game-section active" id="section-digimon"   data-section="digimon">
    <div class="section-header">
      <div><div class="section-game-label">// DIGIMON TCG</div><h2 class="section-title">Card Collection</h2></div>
      <div class="stats-row" id="stats-digimon"></div>
    </div>
    <div class="toolbar" id="toolbar-digimon"></div>
    <div id="cards-digimon"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
  </section>

  <section class="game-section" id="section-gundam"    data-section="gundam">
    <div class="section-header">
      <div><div class="section-game-label">// GUNDAM CARD GAME</div><h2 class="section-title">Card Collection</h2></div>
      <div class="stats-row" id="stats-gundam"></div>
    </div>
    <div class="toolbar" id="toolbar-gundam"></div>
    <div id="cards-gundam"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
  </section>

  <section class="game-section" id="section-riftbound" data-section="riftbound">
    <div class="section-header">
      <div><div class="section-game-label">// RIFTBOUND TCG</div><h2 class="section-title">Card Collection</h2></div>
      <div class="stats-row" id="stats-riftbound"></div>
    </div>
    <div class="toolbar" id="toolbar-riftbound"></div>
    <div id="cards-riftbound"><div class="loading-state"><div class="spinner"></div>Loading…</div></div>
  </section>
</main>

<div id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
//  !! PASTE YOUR APPS SCRIPT WEB APP URL HERE !!
// ══════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbx7DaHZFITvYLUu3Yjyk14SB-o-YisZh5nNTrT3zzE7QvXusvStInVss_R39qORvmDv/exec';
// ══════════════════════════════════════════════════════════════

const GAMES = ['digimon','gundam','riftbound'];

const state = {
  digimon:   { cards:[], view:'grid', filters:{ set:'', rarity:'', owned:'', search:'' }, sort:{ col:'number', dir:1 }, loaded:false },
  gundam:    { cards:[], view:'grid', filters:{ set:'', rarity:'', owned:'', search:'' }, sort:{ col:'number', dir:1 }, loaded:false },
  riftbound: { cards:[], view:'grid', filters:{ set:'', rarity:'', owned:'', search:'' }, sort:{ col:'number', dir:1 }, loaded:false },
};

// ── SETUP CHECK ───────────────────────────────────────────────
if (API_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
  document.getElementById('setup-notice').innerHTML = `
    <div class="setup-banner">
      <span style="font-size:24px">⚙️</span>
      <div>
        <h3>One-time setup required</h3>
        <p>Open <code>index.html</code> and replace <code>YOUR_APPS_SCRIPT_URL_HERE</code>
        with your Apps Script Web App URL, then push to GitHub.<br>
        Your URL looks like: <code>https://script.google.com/macros/s/ABC.../exec</code></p>
      </div>
    </div>`;
  document.getElementById('status-dot').classList.add('error');
  document.getElementById('status-text').textContent = 'API URL not set';
}

// ── LOAD ──────────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (API_URL !== 'YOUR_APPS_SCRIPT_URL_HERE') reloadAll();
});

async function reloadAll() {
  GAMES.forEach(g => { state[g].loaded = false; });
  document.getElementById('status-dot').className = 'status-dot loading';
  document.getElementById('status-text').textContent = 'Loading…';

  try {
    const res  = await fetch(API_URL + '?action=getAll');
    const data = await res.json();

    if (data.error) throw new Error(data.error);

    GAMES.forEach(game => {
      const cards = data[game];
      if (!Array.isArray(cards)) return;
      state[game].cards  = cards;
      state[game].loaded = true;
      buildToolbar(game);
      renderStats(game);
      renderCards(game);
      updateNavBadge(game);
    });

    document.getElementById('status-dot').className = 'status-dot';
    document.getElementById('status-text').textContent = 'Live — ' + new Date().toLocaleTimeString();

  } catch(err) {
    document.getElementById('status-dot').className = 'status-dot error';
    document.getElementById('status-text').textContent = 'Connection error';
    GAMES.forEach(g => {
      document.getElementById('cards-' + g).innerHTML =
        `<div class="empty-state">⚠ Could not load data<br><small style="color:var(--text-dim);font-size:11px">${err.message}</small></div>`;
    });
    toast('⚠ ' + err.message, 'err');
  }
}

// ── NAV ───────────────────────────────────────────────────────
function switchGame(game) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.game === game));
  document.querySelectorAll('.game-section').forEach(s => s.classList.toggle('active', s.id === 'section-' + game));
}

function updateNavBadge(game) {
  const owned = state[game].cards.filter(c => c.owned).length;
  document.getElementById('badge-' + game).textContent = owned + '/' + state[game].cards.length;
}

// ── STATS ─────────────────────────────────────────────────────
function renderStats(game) {
  const cards = state[game].cards;
  const total = cards.length, owned = cards.filter(c => c.owned).length;
  const pct = total > 0 ? Math.round((owned/total)*100) : 0;
  const accent = {digimon:'var(--digi-accent)',gundam:'var(--gun-accent)',riftbound:'var(--rift-accent)'}[game];
  document.getElementById('stats-' + game).innerHTML = `
    <div class="stat-chip"><span class="stat-label">Total</span><span class="stat-value">${total.toLocaleString()}</span></div>
    <div class="stat-chip"><span class="stat-label">Owned</span><span class="stat-value">${owned.toLocaleString()}</span></div>
    <div class="stat-chip"><span class="stat-label">Missing</span><span class="stat-value">${(total-owned).toLocaleString()}</span></div>
    <div class="progress-wrap">
      <div class="progress-header"><span class="stat-label">Completion</span><span class="stat-value" style="font-size:18px">${pct}%</span></div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${accent}"></div></div>
    </div>`;
}

// ── TOOLBAR ───────────────────────────────────────────────────
function buildToolbar(game) {
  const cards    = state[game].cards;
  const sets     = [...new Set(cards.map(c=>c.setName).filter(Boolean))].sort();
  const rarities = [...new Set(cards.map(c=>c.rarity).filter(Boolean))].sort();
  const opts = (arr,ph) => `<option value="">${ph}</option>` + arr.map(v=>`<option value="${x(v)}">${x(v)}</option>`).join('');

  document.getElementById('toolbar-' + game).innerHTML = `
    <div class="toolbar-group">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input class="search-input" type="text" placeholder="Search…" oninput="setFilter('${game}','search',this.value)">
      </div>
      <select onchange="setFilter('${game}','set',this.value)">${opts(sets,'All Sets')}</select>
      <select onchange="setFilter('${game}','rarity',this.value)">${opts(rarities,'All Rarities')}</select>
      <button class="filter-btn" id="ob-all-${game}" onclick="setOwnedF('${game}','')">All</button>
      <button class="filter-btn" id="ob-yes-${game}" onclick="setOwnedF('${game}','owned')">✓ Owned</button>
      <button class="filter-btn" id="ob-no-${game}"  onclick="setOwnedF('${game}','missing')">✕ Missing</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toggle-view">
      <button class="view-btn ${state[game].view==='grid'?'active':''}" onclick="setView('${game}','grid')" title="Grid">⊞</button>
      <button class="view-btn ${state[game].view==='table'?'active':''}" onclick="setView('${game}','table')" title="Table">☰</button>
    </div>
    <span class="result-count" id="count-${game}"></span>
    <div class="print-group">
      <button class="btn-action" onclick="printView('${game}','filtered')">🖨 Print View</button>
      <button class="btn-action" onclick="printView('${game}','all')">🖨 Print All</button>
    </div>`;
  updateOwnedBtns(game);
}

function x(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function setFilter(game,key,val){state[game].filters[key]=val;renderCards(game)}
function setOwnedF(game,val){state[game].filters.owned=val;updateOwnedBtns(game);renderCards(game)}
function updateOwnedBtns(game){
  const cur=state[game].filters.owned;
  [['all',''],['yes','owned'],['no','missing']].forEach(([k,v])=>{
    const b=document.getElementById('ob-'+k+'-'+game);
    if(b)b.classList.toggle('active',cur===v);
  });
}
function setView(game,view){
  state[game].view=view;
  document.getElementById('toolbar-'+game).querySelectorAll('.view-btn').forEach(b=>
    b.classList.toggle('active',(view==='grid'&&b.title==='Grid')||(view==='table'&&b.title==='Table'))
  );
  renderCards(game);
}

// ── FILTER + SORT ─────────────────────────────────────────────
function getFiltered(game){
  const {cards,filters,sort}=state[game];
  const q=filters.search.toLowerCase();
  let r=cards.filter(c=>{
    if(filters.set    &&c.setName!==filters.set)   return false;
    if(filters.rarity &&c.rarity !==filters.rarity)return false;
    if(filters.owned==='owned'  &&!c.owned)        return false;
    if(filters.owned==='missing'&& c.owned)        return false;
    if(q&&!c.name.toLowerCase().includes(q)&&!c.number.toLowerCase().includes(q))return false;
    return true;
  });
  r.sort((a,b)=>{const va=a[sort.col]||'',vb=b[sort.col]||'';return va<vb?-sort.dir:va>vb?sort.dir:0});
  return r;
}

// ── RENDER ────────────────────────────────────────────────────
function renderCards(game){
  const filtered=getFiltered(game);
  const el=document.getElementById('count-'+game);
  if(el)el.textContent=filtered.length+' cards';
  const c=document.getElementById('cards-'+game);
  if(!c)return;
  if(!filtered.length){c.innerHTML='<div class="empty-state">// NO CARDS MATCH CURRENT FILTERS</div>';return;}
  c.innerHTML=state[game].view==='grid'?renderGrid(filtered,game):renderTable(filtered,game);
  // Lazily load proxied Gundam images as they scroll into view
  setTimeout(initProxyObserver, 50);
}

function renderGrid(cards,game){
  return`<div class="card-grid">`+cards.map(c=>`
    <div class="card-item ${c.owned?'owned':'unowned'}" id="ci-${game}-${c.rowIndex}">
      <div class="card-img-wrap">
        ${c.imageUrl
          ? c.imageUrl.includes('gundam-gcg.com')
            ? `<img data-proxy="${x(c.imageUrl)}" alt="${x(c.name)}" style="width:100%;height:100%;object-fit:cover" onerror="this.style.display='none'">`
            : `<img src="${x(c.imageUrl)}" alt="${x(c.name)}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">`
          : ``}
        <div class="card-img-placeholder" style="${c.imageUrl?'display:none':''}"><span>${x(c.number)}</span></div>
        ${c.owned?`<div class="owned-badge">✓</div>`:''}
      </div>
      <div class="card-info">
        <div class="card-number">${x(c.number)}</div>
        <div class="card-name">${x(c.name)}</div>
        <div class="card-rarity">${x(c.rarity)}</div>
      </div>
      <button class="card-toggle" onclick="toggleOwned('${game}',${c.rowIndex},${!c.owned})">
        ${c.owned?'✕ Mark as Missing':'✓ Mark as Owned'}
      </button>
    </div>`).join('')+`</div>`;
}

function renderTable(cards,game){
  const s=state[game].sort;
  const th=(col,label)=>`<th class="${s.col===col?'sorted':''}" onclick="sortBy('${game}','${col}')">
    ${label}<span class="sa">${s.col===col?(s.dir===1?'↑':'↓'):'↕'}</span></th>`;
  return`<div class="card-table-wrap"><table class="card-table">
    <thead><tr><th style="width:52px">IMG</th>${th('number','Number')}${th('name','Name')}${th('setName','Set')}${th('rarity','Rarity')}<th>Owned</th></tr></thead>
    <tbody>${cards.map(c=>`
      <tr class="${c.owned?'owned':'unowned'}" id="tr-${game}-${c.rowIndex}">
        <td>${c.imageUrl?`<img class="table-thumb" src="${x(c.imageUrl)}" alt="${x(c.name)}" loading="lazy" onerror="this.outerHTML='<div class=\\'thumb-ph\\'>—</div>'">`:
          `<div class="thumb-ph">—</div>`}</td>
        <td style="font-family:'Share Tech Mono',monospace;font-size:11px">${x(c.number)}</td>
        <td style="font-weight:600">${x(c.name)}</td>
        <td style="color:var(--text-muted)">${x(c.setName)}</td>
        <td style="color:var(--text-muted)">${x(c.rarity)}</td>
        <td><button class="owned-pill ${c.owned?'yes':'no'}" id="pill-${game}-${c.rowIndex}"
          onclick="toggleOwned('${game}',${c.rowIndex},${!c.owned})">${c.owned?'✓ Yes':'✕ No'}</button></td>
      </tr>`).join('')}
    </tbody></table></div>`;
}

function sortBy(game,col){
  const s=state[game].sort;
  s.col===col?s.dir*=-1:(s.col=col,s.dir=1);
  renderCards(game);
}

// ── PROXIED IMAGE LOADER ─────────────────────────────────────
// Uses IntersectionObserver so we only fetch Gundam images as they scroll into view,
// not all 700+ at once which would hammer the Apps Script quota.

let _proxyObserver = null;

function initProxyObserver() {
  if (_proxyObserver) _proxyObserver.disconnect();
  _proxyObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const img = entry.target;
      const url = img.dataset.proxy;
      if (url) {
        loadProxiedImage(img, url);
        _proxyObserver.unobserve(img);
        delete img.dataset.proxy;
      }
    });
  }, { rootMargin: '200px' });

  document.querySelectorAll('img[data-proxy]').forEach(img => {
    _proxyObserver.observe(img);
  });
}

// ── OWNERSHIP TOGGLE ──────────────────────────────────────────
async function toggleOwned(game, rowIndex, newOwned) {
  const card = state[game].cards.find(c => c.rowIndex === rowIndex);
  if (!card) return;

  // Optimistic update
  card.owned = newOwned;
  updateCardEl(game, rowIndex, newOwned);
  renderStats(game);
  updateNavBadge(game);

  try {
    const url = `${API_URL}?action=setOwned&game=${game}&row=${rowIndex}&owned=${newOwned?1:0}`;
    const res  = await fetch(url);
    const data = await res.json();

    if (data.error) throw new Error(data.error);
    toast(newOwned ? '✓ Marked as owned' : '✕ Marked as missing', 'ok');

  } catch(err) {
    // Revert
    card.owned = !newOwned;
    updateCardEl(game, rowIndex, !newOwned);
    renderStats(game);
    updateNavBadge(game);
    toast('⚠ Save failed: ' + err.message, 'err');
  }
}

function updateCardEl(game, rowIndex, owned) {
  // Grid card
  const ci = document.getElementById('ci-' + game + '-' + rowIndex);
  if (ci) {
    ci.classList.toggle('owned', owned);
    ci.classList.toggle('unowned', !owned);
    let badge = ci.querySelector('.owned-badge');
    if (owned && !badge) {
      badge = document.createElement('div');
      badge.className = 'owned-badge'; badge.textContent = '✓';
      ci.querySelector('.card-img-wrap').appendChild(badge);
    } else if (!owned && badge) badge.remove();
    const btn = ci.querySelector('.card-toggle');
    if (btn) btn.textContent = owned ? '✕ Mark as Missing' : '✓ Mark as Owned';
  }
  // Table row
  const tr = document.getElementById('tr-' + game + '-' + rowIndex);
  if (tr) {
    tr.classList.toggle('owned', owned);
    tr.classList.toggle('unowned', !owned);
    const pill = document.getElementById('pill-' + game + '-' + rowIndex);
    if (pill) {
      pill.className = 'owned-pill ' + (owned ? 'yes' : 'no');
      pill.textContent = owned ? '✓ Yes' : '✕ No';
      pill.setAttribute('onclick', `toggleOwned('${game}',${rowIndex},${!owned})`);
    }
  }
}

// ── IMAGE URL RESOLVER ───────────────────────────────────────
// gundam-gcg.com blocks cross-origin requests (CORS).
// We route those through our Apps Script proxy which fetches server-side.
// All other image URLs (Digimon Bandai CDN, Riftbound Riot CDN) load fine directly.

function resolveImgSrc(url) {
  if (!url) return '';
  // Proxy anything from gundam-gcg.com through Apps Script
  if (url.includes('gundam-gcg.com')) {
    return API_URL + '?action=img&url=' + encodeURIComponent(url);
  }
  return url;
}

// Wrap the proxy src in a data URI so <img> can display it
// Called lazily when a card image enters view (via IntersectionObserver)
async function loadProxiedImage(imgEl, url) {
  try {
    const proxyUrl = API_URL + '?action=img&url=' + encodeURIComponent(url);
    const resp     = await fetch(proxyUrl);
    const b64      = await resp.text();
    if (b64) {
      const mime = url.endsWith('.webp') ? 'image/webp' : 'image/jpeg';
      imgEl.src = 'data:' + mime + ';base64,' + b64;
    }
  } catch(e) {
    imgEl.style.display = 'none';
  }
}

// ── PRINT ─────────────────────────────────────────────────────
// Opens a clean new window with a simple table — avoids browser choking
// on thousands of card DOM elements from the main view.
function printView(game, mode) {
  const allCards   = state[game].cards;
  const filtered   = getFiltered(game);
  const cards      = mode === 'all' ? allCards : filtered;
  const ownedOnly  = mode === 'filtered' && state[game].filters.owned === 'owned';

  const gameName = { digimon:'DIGIMON TCG', gundam:'GUNDAM CARD GAME', riftbound:'RIFTBOUND TCG' }[game];
  const total    = allCards.length;
  const ownedCt  = allCards.filter(c => c.owned).length;
  const pct      = total > 0 ? Math.round((ownedCt / total) * 100) : 0;

  // Build a human-readable filter summary for the print header
  const f = state[game].filters;
  const activeFilters = [];
  if (f.set)    activeFilters.push('Set: ' + f.set);
  if (f.rarity) activeFilters.push('Rarity: ' + f.rarity);
  if (f.owned === 'owned')   activeFilters.push('Status: Owned only');
  if (f.owned === 'missing') activeFilters.push('Status: Missing only');
  if (f.search) activeFilters.push('Search: "' + f.search + '"');
  const filterSummary = activeFilters.length > 0
    ? 'Filters: ' + activeFilters.join(' · ')
    : 'No filters applied — showing all cards';
  const label = mode === 'all'
    ? `All ${cards.length} cards (no filters)`
    : `${cards.length} cards · ${filterSummary}`;

  const gridItems = cards.map(c => `
    <div style="border:1px solid #e5e7eb;border-radius:8px;overflow:hidden;break-inside:avoid;
      background:${c.owned ? '#fff' : '#f9f9f9'};opacity:${c.owned ? '1' : '0.55'}">
      <div style="aspect-ratio:3/4;background:#f3f4f6;overflow:hidden;position:relative">
        ${c.imageUrl
          ? `<img src="${c.imageUrl}" style="width:100%;height:100%;object-fit:cover;display:block" onerror="this.style.display='none'">`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;color:#aaa">${c.number}</div>`}
        <div style="position:absolute;top:2px;right:2px;width:10px;height:10px;border-radius:50%;
          background:${c.owned ? '#dcfce7' : '#fee2e2'};display:flex;align-items:center;
          justify-content:center;font-size:6px;font-weight:700;color:${c.owned ? '#166534' : '#991b1b'}">
          ${c.owned ? '✓' : '✕'}
        </div>
      </div>
      <div style="padding:2px 3px 3px">
        <div style="font-family:monospace;font-size:6px;color:#9ca3af;margin-bottom:1px">${c.number}</div>
        <div style="font-size:6px;font-weight:700;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</div>
      </div>
    </div>`).join('');

  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8">
    <title>${gameName} — Collection Print</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 16px; color: #111; }
      h1 { font-size: 20px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 4px; }
      .meta { font-size: 12px; color: #666; margin-bottom: 16px; display: flex; gap: 24px; flex-wrap: wrap; align-items: flex-end; }
      .stat { display: inline-flex; flex-direction: column; gap: 2px; }
      .stat-l { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: #999; }
      .stat-v { font-size: 18px; font-weight: 700; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(52px, 1fr)); gap: 4px; }
      @page { margin: 12mm; }
      @media print { body { margin: 0; } }
    </style>
  </head><body>
    <h1>${gameName}</h1>
    <div class="meta">
      <span class="stat"><span class="stat-l">Total</span><span class="stat-v">${total.toLocaleString()}</span></span>
      <span class="stat"><span class="stat-l">Owned</span><span class="stat-v">${ownedCt.toLocaleString()}</span></span>
      <span class="stat"><span class="stat-l">Missing</span><span class="stat-v">${(total-ownedCt).toLocaleString()}</span></span>
      <span class="stat"><span class="stat-l">Completion</span><span class="stat-v">${pct}%</span></span>
      <span style="margin-left:auto;font-size:11px;color:#999">${label}</span>
    </div>
    <div class="grid">${gridItems}</div>
    <script>window.onload = () => { window.print(); }<\/script>
  </body></html>`;

  const win = window.open('', '_blank');
  win.document.write(html);
  win.document.close();
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg, type='ok') {
  const el = document.createElement('div');
  el.className = 'toast-msg ' + type;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 2800);
}
</script>
</body>
</html>
